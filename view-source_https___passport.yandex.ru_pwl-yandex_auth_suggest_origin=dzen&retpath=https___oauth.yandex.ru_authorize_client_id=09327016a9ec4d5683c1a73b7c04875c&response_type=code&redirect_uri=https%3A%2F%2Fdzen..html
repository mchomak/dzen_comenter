            <!-- Порядок в head несёт три инварианта:
                 1) весь render-blocking CSS (styleTags, customs, c13n, routeStyleTags) идёт ДО
                    объёмных inline-i18n: на медленной сети head приходит по частям, и CSS в
                    хвосте откладывал бы paint на сотни ms;
                 2) каскад styleTags → customs → c13n → route-CSS зафиксирован — менять нельзя;
                 3) scriptTags строго ПОСЛЕ inline-i18n: async-чанк может исполниться сразу после
