                  - generic [ref=e152]:
                    - paragraph [ref=e175]: Друзья, представьте себе идеальную кухню - современную, стильную, эстетически привлекательную. Теперь представьте себе обратное - колхозную кухню, которая кричит о непрофессионализме и неграмотном подходе к дизайну. Что делает кухню колхозной? Что так сильно портит ее внешний вид и создает негативное впечатление?
