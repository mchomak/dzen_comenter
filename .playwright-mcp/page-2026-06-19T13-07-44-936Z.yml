                      - text: ✅
                    - heading "❌ 8. Использование витрин, похожих на бабушкины серванты." [level=3]
                    - paragraph [ref=e281]: Это тренд, который начал появляться снова, но с уродливыми шкафами из двухтысячных годов. Примером неудачной витрины может служить прозрачное стекло, широкая алюминиевая рамка, отсутствие внутреннего освещения и странное дерево. Сравнительно, классная витрина имеет тонкую алюминиевую рамку, прозрачное стекло, акцентное дерево и эффектную вертикальную подсветку.
                    - heading "❌ 9. Использование круглой хромированной трубы в качестве опоры под барной стойкой." [level=3]
                    - paragraph [ref=e282]: Эта идея возникла ещё в 2000-х годах, когда было модно использовать хромированные шесты.
                    - paragraph [ref=e283]: Альтернативным вариантом являются стильные и современные барные подстолья различных форм или просто прямоугольная труба.
                    - heading "❌ 10. Использование евровинта на торце вашей кухни, который закрыт заглушкой." [level=3]
                    - paragraph [ref=e284]: Её часто применяют кустарщики и мебельные фабрики, работающие в самом бюджетном сегменте. Если у вас на торце кухни видно использование евровинта, закрытого заглушкой, то скорее всего вам продали самую дешевую модульную кухню.
