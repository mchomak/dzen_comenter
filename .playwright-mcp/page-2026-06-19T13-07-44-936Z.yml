                    - heading "❌ 2. Круглые мойки из нержавеющей стали, либо накладные, либо с крылом." [level=3]
                    - paragraph [ref=e205]: Они сильно выбиваются из интерьера и выглядят на столешнице как заплатка. Кроме того, такие мойки имеют маленький радиус, что ограничивает их вместимость.
                    - generic [ref=e206]:
                      - 'figure "Designed by Freepik. Источник: www.freepik.com" [ref=e211] [cursor=pointer]':
