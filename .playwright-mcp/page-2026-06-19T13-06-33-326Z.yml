                        - /url: /away?to=https%3A%2F%2Fdomeo-remont.ru%3Futm_source%3Ddzen%26utm_medium%3Dnkt%26utm_campaign%3Dnkt-dzen-chanel%26utm_content%3Devgeniya%26utm_term%3D2306-svhodchenkova1R
                      - text: ✅
                    - heading "Расположение" [level=2]
                    - paragraph [ref=e179]: Актриса снималась в таких высокобюджетных фильмах как «Благословите женщину», «Любовь в большом городе», «Викинг» и т. д. Поэтому неудивительно, что её гонораров хватило на покупку квартиры в комплексе Москва-сити.
                    - figure [ref=e185] [cursor=pointer]:
                      - img "-3" [ref=e186]
                    - paragraph [ref=e187]:
                      - text: Кстати, неподалёку находится
                      - link "квартира Ивана Урганта" [ref=e188] [cursor=pointer]:
                        - /url: https://dzen.ru/a/Y-NDkvL23S0I4IEF?feed_exp=ordinary_feed&rid=281153166.94.1681793377211.64434&clid=1400&integration=site_desktop&place=multisearch&secdata=CNH3wJDjMCABUA9qAQE%3D
                      - text: — она расположена в башне Меркурий.
                    - paragraph [ref=e189]: Из окон столичной квартиры Ходченковой открывается потрясающий вид на автомагистрали и соседние небоскрёбы.
                    - figure [ref=e195] [cursor=pointer]:
