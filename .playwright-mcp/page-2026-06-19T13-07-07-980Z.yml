                    - paragraph [ref=e163]: Светлана Ходченкова известна своими ролями не только в отечественных кинолентах, но и за рубежом. Достаточно долго актриса прожила за границей - в штатах и Японии, но сейчас она вернулась в Россию и уже обустроила свою квартиру в Москве. Готовы увидеть, в каких интерьерах живет звезда кино?
                    - figure [ref=e169] [cursor=pointer]
                    - blockquote [ref=e170]: Поставьте лайк ❤️ статье, мне очень важна ваша поддержка. ПОДПИШИТЕСЬ, чтобы узнавать о новых публикациях про знаменитостей первыми!
                    - heading "Готовитесь начать ремонт?" [level=3]
                    - figure [ref=e176] [cursor=pointer]:
                      - img "-2" [ref=e177]
                    - heading "✅ РАССЧИТАЙТЕ ЗДЕСЬ ✅" [level=3]:
                      - text: ✅
                      - link "РАССЧИТАЙТЕ ЗДЕСЬ" [ref=e178] [cursor=pointer]:
                        - /url: /away?to=https%3A%2F%2Fdomeo-remont.ru%3Futm_source%3Ddzen%26utm_medium%3Dnkt%26utm_campaign%3Dnkt-dzen-chanel%26utm_content%3Devgeniya%26utm_term%3D2306-svhodchenkova1R
                      - text: ✅
                    - heading "Расположение" [level=2]
                    - paragraph [ref=e179]: Актриса снималась в таких высокобюджетных фильмах как «Благословите женщину», «Любовь в большом городе», «Викинг» и т. д. Поэтому неудивительно, что её гонораров хватило на покупку квартиры в комплексе Москва-сити.
                    - figure [ref=e185] [cursor=pointer]:
                      - img "-3" [ref=e186]
                    - paragraph [ref=e187]:
                      - text: Кстати, неподалёку находится
                      - link "квартира Ивана Урганта" [ref=e188] [cursor=pointer]:
                        - /url: https://dzen.ru/a/Y-NDkvL23S0I4IEF?feed_exp=ordinary_feed&rid=281153166.94.1681793377211.64434&clid=1400&integration=site_desktop&place=multisearch&secdata=CNH3wJDjMCABUA9qAQE%3D
                      - text: — она расположена в башне Меркурий.
                    - paragraph [ref=e189]: Из окон столичной квартиры Ходченковой открывается потрясающий вид на автомагистрали и соседние небоскрёбы.
                    - figure [ref=e195] [cursor=pointer]:
                      - img "-4" [ref=e196]
                    - heading "Сколько стоит ремонт квартиры в 2023 году?" [level=3]
                    - figure [ref=e202] [cursor=pointer]:
                      - img "-5" [ref=e203]
                    - heading "✅ РАССЧИТАЙТЕ ЗДЕСЬ ✅" [level=2]:
                      - generic [ref=e204]: ✅
                      - link "РАССЧИТАЙТЕ ЗДЕСЬ" [ref=e205] [cursor=pointer]:
                        - /url: /away?to=https%3A%2F%2Fdomeo-remont.ru%2F%3Futm_source%3Ddzen%26utm_medium%3Dnkt%26utm_campaign%3Dnkt-dzen-chanel%26utm_content%3Devgeniya%26utm_term%3D2306-svhodchenkova2R
                      - generic [ref=e206]: ✅
                    - heading "Оформление комнат" [level=3]:
                      - generic [ref=e207]: Оформление комнат
                    - paragraph [ref=e208]: Каждая комната в квартире Светланы Ходченковой оформлена в своём стиле. Так, например, на кухне можно видеть классическую отделку, мебель и декор. Столешница сделана из мрамора, а белоснежные стены украшают молдинги.
                    - figure [ref=e214] [cursor=pointer]:
                      - img "-6" [ref=e215]
                    - paragraph [ref=e216]: В гостиной тоже классический интерьер, но здесь преобладают элементы дворцовой роскоши. На полу — паркет из ореха, на стенах — текстильные обои с цветочными узорами. Шторы — велюровые, а итальянская мебель обита настоящим бархатом.
                    - figure [ref=e222] [cursor=pointer]:
                      - img "-7" [ref=e223]
                    - figure [ref=e229] [cursor=pointer]:
                      - img "-8" [ref=e230]
                    - paragraph [ref=e231]:
                      - text: По соседству с гостиной находится зона отдыха, которую оформили в стиле лофт. В одной из своих статей я рассказывала,
                      - link "как на убитой кухне создали лофт-интерьер" [ref=e232] [cursor=pointer]:
                        - /url: https://dzen.ru/a/Y-s8kjg3TRXbRIhP?feed_exp=ordinary_feed&rid=1010349119.96.1681793812766.51627&clid=1400&integration=site_desktop&place=multisearch&secdata=CJTC0v7kMCABUA9qAQE%3D
                      - text: . Этот стиль отлично подходит и для старых, и для новых квартир.
                    - figure [ref=e238] [cursor=pointer]:
                      - img "-9" [ref=e239]
                    - paragraph [ref=e240]: А вот спальня оформлена в эклектичном стиле — тут перемешались пастельные тона, яркие мозаичные элементы, цветочные узоры и т. д. Но от каждого элемента в комнате веет роскошью и долгой историей, поэтому все они гармонично сочетаются между собой.
