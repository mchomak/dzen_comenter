                      - listitem [ref=e146] [cursor=pointer]:
                        - link "Сколько стоит ремонт в 2023 году?" [ref=e147]:
                          - /url: "#skolko_stoit_remont_v_2023_gody"
                          - generic [ref=e148]: Сколько стоит ремонт в 2023 году?
                    - button "Показать ещё" [ref=e149] [cursor=pointer]
                  - generic [ref=e150]:
                    - paragraph [ref=e161]: Елена Ваенга — настоящая жительница Петербурга, которая не готова расставаться с родными местами ни за какие деньги. Даже свой загородный дом она не стала строить в более тёплом климате, а решила жить недалеко от северной столицы, в посёлке Кузьмолово. Это очень уютное и жизнерадостное место, на которое я предлагаю вам посмотреть в этом обзоре.
                    - figure [ref=e167] [cursor=pointer]
                    - figure [ref=e173] [cursor=pointer]:
                      - img "-2" [ref=e174]
                    - blockquote [ref=e175]:
                      - text: "Хотите сделать ремонт, но не разориться на этом? Можно сделать преображение бюджетно, рассчитайте цену ремонта, перейдя по ссылке: 👉"
                      - link "рассчитать" [ref=e176] [cursor=pointer]:
                        - /url: /away?to=https%3A%2F%2Fdomeo-remont.ru%2F%3Futm_source%3Ddzen%26utm_medium%3Dnkt%26utm_campaign%3Dnkt-dzen-chanel%26utm_content%3Dfelles28%26utm_term%3D2307-dom_vaengi1R
                      - text: 👈. Это бесплатно, и займёт всего полминуты!
                    - heading "Участок возле дома" [level=2]
                    - paragraph [ref=e177]: Пространство рядом с особняком не простаивает без дела, как у многих других знаменитостей. Несмотря на солидные доходы, Елена Ваенга собственноручно занимается выращиванием овощей и фруктов, и даже держит кур!
                    - paragraph [ref=e178]: Для выращивания помидоров недалеко от дома даже возвели большую теплицу высотой больше человеческого роста. В ней томатам удаётся расти даже в неблагоприятном питерском климате.
                    - figure [ref=e184] [cursor=pointer]:
                      - img "-3" [ref=e185]
                    - paragraph [ref=e186]: Также на территории усадьбы есть курятник и целый загон для выгула птиц. Он расположен прямо в небольшой роще, которая находилась на участке ещё до его покупки. Кормит кур и собирает яйца Елена Ваенга сама, поскольку делает это для личного удовольствия. Кто бы мог подумать, что роскошная певица занимается таким хобби!
                    - figure [ref=e192] [cursor=pointer]:
                      - img "-4" [ref=e193]
                    - paragraph [ref=e194]: Елена Ваенга настолько увлечена сельским хозяйством, что даже выкладывает в социальные сети фотографии своих рекордов. Посмотрите, какой урожай тыкв ей удалось однажды собрать!
                    - figure [ref=e200] [cursor=pointer]:
                      - img "-5" [ref=e201]
                    - paragraph [ref=e202]: Но, разумеется, в загородном доме есть место не только для труда, но и для отдыха. На улице таким местом служит терраса. Здесь стоит небольшой столик для перекусов, несколько лавочек и диван, выглядящий как гигантская покрышка.
                    - figure [ref=e208] [cursor=pointer]:
                      - img "-6" [ref=e209]
                    - paragraph
                    - heading "Интерьер особняка" [level=2]
                    - paragraph [ref=e210]: Центральное место внутри дома занимает столовая, совмещённая с гостиной. Здесь стоит длинный обеденный стол, рассчитанный на 10 человек. На полу лежит ламинат, но не он, а текстиль является главным украшением интерьера. Елена Ваенга лично подбирала шторы, скатерти и другие тканные украшения для оформления особняка.
                    - figure [ref=e216] [cursor=pointer]:
                      - img "-7" [ref=e217]
                    - paragraph
                    - heading "Сколько стоит ремонт в 2023 году?" [level=2]
                    - generic [ref=e230]:
                      - generic:
                        - generic:
                          - generic "Активное изображение" [ref=e231] [cursor=pointer]:
                            - figure [ref=e234]:
                              - img "-8" [ref=e235]
                          - figure [ref=e239] [cursor=pointer]:
                            - img "-8-2" [ref=e240]
                          - figure [ref=e244] [cursor=pointer]:
                            - img "-8-3" [ref=e245]
                    - paragraph
                    - heading "✅РАССЧИТАЙТЕ ЗДЕСЬ✅" [level=2]:
                      - text: ✅
                      - link "РАССЧИТАЙТЕ ЗДЕСЬ" [ref=e246] [cursor=pointer]:
                        - /url: /away?to=https%3A%2F%2Fdomeo-remont.ru%2F%3Futm_source%3Ddzen%26utm_medium%3Dnkt%26utm_campaign%3Dnkt-dzen-chanel%26utm_content%3Dfelles28%26utm_term%3D2307-dom_vaengi2R%23mc_0
                      - text: ✅
                    - paragraph
                    - paragraph [ref=e247]: Ещё одна немаловажная деталь интерьера гостиной — большой камин напротив стола. Он выложен из натурального крупного камня. В осеннее и зимнее время камин никогда не простаивает без дела — погода Ленобласти накладывает свой отпечаток на быт.
                    - figure [ref=e253] [cursor=pointer]:
                      - img "-9" [ref=e254]
                    - paragraph [ref=e255]: Рядом со столовой расположилась кухня. Как ни странно, то помещение оформлено в соответствии с современными минималистичными трендами. Фасады снабжены системами «Push-to-Open», и имеют абсолютно гладкую тёмно-серую поверхность. Вся техника на кухне тоже встроена. Елена Ваенга исходила из соображений практичности, поэтому большая часть техники имеет белый цвет.
                    - figure [ref=e261] [cursor=pointer]:
                      - img "-10" [ref=e262]
                    - paragraph [ref=e263]: Тут же, в гостиной, находится лестница на второй этаж, которая будто бы висит в воздухе. Малозаметные соединения ступеней и прозрачные ограждения из закалённого стекла создают очень необычный эффект, который завораживает внимание.
                    - figure [ref=e269] [cursor=pointer]:
                      - img "-11" [ref=e270]
                    - paragraph [ref=e271]: В холле второго этажа расположилась небольшая библиотека и музыкальный зал. Здесь Елена Ваенга всё внимание акцентировала на рояль — на фоне чёрных стен инструмент сильно выделяется, и притягивает к себе взгляд.
                    - figure [ref=e277] [cursor=pointer]:
                      - img "-12" [ref=e278]
                    - paragraph [ref=e279]: "Поблизости находятся жилые комнаты и ванная, которую тоже певица отделала по своему вкусу. В интерьере ванной использованы красно-белые оттенки: три стены отделаны глянцевой красной плиткой, а пол и четвёртая стена белые."
                    - figure [ref=e285] [cursor=pointer]:
                      - img "-13" [ref=e286]
                    - paragraph [ref=e287]: А вам нравится оформление загородного дома Елены Ваенги? Поделитесь мнением в комментариях 👇.
                    - heading "С чего начать ремонт?" [level=2]
                    - figure [ref=e293] [cursor=pointer]:
                      - img "-14" [ref=e294]
                    - paragraph [ref=e295]: "Domeo советует начать свой ремонт с 2х простых шагов:"
