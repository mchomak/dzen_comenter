                        - generic [ref=e439]: Со вчерашнего дня, как стало известно о смерти народной артистки СССР, невероятной красавицы Людмилы Чурсиной, сохранившей красоту почти до конца жизни, о ней продолжают говорить. Вспоминают в основном коллеги – снимались вместе, выходили на сцену. И в этих воспоминаниях зачастую больше себя, чем ее. Но мы нашли человека, не связанного с миром искусства, но которую 25 лет дружбы связывают со знаменитой актрисой. Это Юлия Пенкина, завуч самой обычной школы в Калининском районе Санкт-Петербурга. Открылась другая Людмила Чурсина...
