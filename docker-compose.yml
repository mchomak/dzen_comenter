services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      VNC_PORT: ${VNC_PORT:-5900}
      VNC_PASSWORD: ${VNC_PASSWORD:-}
    ports:
      - "${VNC_PORT:-5900}:${VNC_PORT:-5900}"
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dzen
      POSTGRES_PASSWORD: dzen
      POSTGRES_DB: dzen_commenter
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata:
