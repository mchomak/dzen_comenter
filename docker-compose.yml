services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://dzen:dzen@postgres:5432/dzen_commenter
      USER_DATA_DIR: /app/user_data
      STORAGE_STATE_PATH: /app/session_state/storage_state.json
      GIGACHAT_VERIFY_SSL_CERTS: "true"
      VNC_PORT: ${VNC_PORT:-5900}
      VNC_PASSWORD: ${VNC_PASSWORD:-}
      NOVNC_PORT: ${NOVNC_PORT:-6080}
    volumes:
      - browser_data:/app/user_data
      - session_state:/app/session_state
    ports:
      - "${VNC_PORT:-5900}:${VNC_PORT:-5900}"
      - "${NOVNC_PORT:-6080}:${NOVNC_PORT:-6080}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dzen
      POSTGRES_PASSWORD: dzen
      POSTGRES_DB: dzen_commenter
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dzen -d dzen_commenter"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  pgdata:
  browser_data:
  session_state:
